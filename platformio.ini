[platformio]

[env:m5stack-cardputer]
platform = espressif32@6.7.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_flags =
    -DESP32S3
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    https://github.com/m5stack/M5Gfx#0.2.19
    https://github.com/m5stack/M5Unified#0.2.13
    https://github.com/m5stack/M5Cardputer#1.1.1
    https://github.com/m5stack/TinyGPSPlus
    https://github.com/Hopperpop/Sgp4-Library
    bblanchon/ArduinoJson